<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auto Guincho - Maior portal de socorro automotivo</title>
    <meta name="description" content="Encontre guinchos, muncks e mecânica rápida perto de você. Sem intermediários. Fale direto com o motorista.">
    <!-- Tailwind CSS Integrado (para o build SSG usaremos CDN na v2 inicial para simplificar) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .bg-navy { background-color: #050b14; }
        .text-gold { color: #d4af37; border-color: #d4af37; }
        .bg-gold { background-color: #d4af37; }
        .text-ivory { color: #f8f9fa; }
    </style>
</head>
<body class="bg-navy font-sans text-ivory min-h-screen flex flex-col">

<!-- Header Simples -->
<header class="py-6 px-4 md:px-8 bg-black/30 sticky top-0 backdrop-blur-md border-b border-gray-800 z-50">
    <div class="max-w-6xl mx-auto flex justify-between items-center">
        <a href="/" class="text-2xl font-black tracking-tighter text-white">Auto<span class="text-gold">Guincho</span></a>
        <nav class="hidden md:flex gap-6 text-sm font-medium text-gray-300">
            <a href="/guincho" class="hover:text-gold transition-colors">Guinchos</a>
            <a href="/mecanico" class="hover:text-gold transition-colors">Mecânica</a>
            <a href="/chaveiro" class="hover:text-gold transition-colors">Chaveiros</a>
        </nav>
    </div>
</header>

<main class="flex-grow flex flex-col items-center justify-center p-6 text-center">
    <div class="max-w-3xl w-full">
        <h1 class="text-5xl md:text-7xl font-extrabold tracking-tight mb-6 mt-10 leading-tight">
            Seu Veículo Parou?<br/>
            <span class="text-gold">Socorro Perto de Você.</span>
        </h1>
        <p class="text-lg md:text-xl text-gray-400 mb-10 max-w-2xl mx-auto">
            Encontre profissionais no seu município. Negocie sem intermediários, comissionamentos ou taxas ocultas.
        </p>
        
        <div class="bg-gray-900 border border-gray-800 p-6 rounded-2xl shadow-2xl">
            <form id="search-form" class="flex flex-col md:flex-row gap-4" onsubmit="event.preventDefault(); executeCitySearch();">
                
                <div class="flex-1">
                    <label for="category-select" class="sr-only">Serviço Desejado</label>
                    <select id="category-select" class="w-full bg-gray-800 border items-center border-gray-700 text-white rounded-xl px-4 py-4 focus:ring-2 focus:ring-gold focus:outline-none appearance-none cursor-pointer">
                        <option value="guincho-plataforma" selected>Reboque / Guincho</option>
                        <option value="mecanica-rapida">Mecânica Rápida</option>
                        <option value="borracharia">Borracharia Auto</option>
                        <option value="chaveiro-24h">Chaveiro 24h</option>
                    </select>
                </div>

                <div class="flex-[2] relative">
                    <label for="city-input" class="sr-only">Em qual cidade você está?</label>
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                        <svg class="h-5 w-5 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                    </div>
                    <input type="text" id="city-input" required autocomplete="off" placeholder="Digite sua cidade (Ex: Novo Hamburgo)..." class="w-full bg-gray-800 border items-center border-gray-700 text-white rounded-xl pl-12 pr-4 py-4 focus:ring-2 focus:ring-gold focus:outline-none focus:border-transparent">
                    
                    <!-- Autocomplete Dropdown -->
                    <ul id="autocomplete-list" class="absolute z-10 w-full bg-gray-800 border border-t-0 border-gray-700 rounded-b-xl shadow-2xl mt-1 hidden max-h-60 overflow-y-auto text-left">
                        <!-- Itens vão aqui via JS -->
                    </ul>
                </div>

                <div class="hidden">
                    <input type="hidden" id="selected-uf" value="">
                    <input type="hidden" id="selected-city-slug" value="">
                </div>

                <button type="button" onclick="executeCitySearch()" class="bg-gold hover:bg-yellow-500 text-black font-bold text-lg px-8 py-4 rounded-xl transition-all whitespace-nowrap shadow-[0_0_15px_rgba(212,175,55,0.4)]">
                    Encontrar
                </button>
            </form>
            <p id="geo-status" class="mt-4 text-sm text-red-400 hidden"></p>
        </div>

    </div>
</main>

<footer class="py-8 bg-black/50 text-center text-sm text-gray-600 border-t border-gray-800 mt-auto">
    <p>&copy; 2026 Auto Guincho. Diretório de Profissionais de Socorro.</p>
</footer>

<script>
    const cityInput = document.getElementById('city-input');
    const autocompleteList = document.getElementById('autocomplete-list');
    const selectedUf = document.getElementById('selected-uf');
    const selectedCitySlug = document.getElementById('selected-city-slug');
    let debounceTimer;

    // Listener de digitação com Debounce
    cityInput.addEventListener('input', function() {
        clearTimeout(debounceTimer);
        const query = this.value.trim();
        
        // Limpar seleção anterior
        selectedUf.value = "";
        selectedCitySlug.value = "";
        
        if (query.length < 2) {
            autocompleteList.innerHTML = '';
            autocompleteList.classList.add('hidden');
            return;
        }

        debounceTimer = setTimeout(async () => {
            try {
                const slug = query.normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/\s+/g, '-').toLowerCase();
                const response = await fetch(`/api/cities/search?q=${slug}`);
                const data = await response.json();
                
                autocompleteList.innerHTML = '';
                
                if (data.success && data.cities.length > 0) {
                    data.cities.forEach(city => {
                        const li = document.createElement('li');
                        li.className = "px-4 py-3 hover:bg-gray-700 cursor-pointer border-b border-gray-700 last:border-0 text-white flex justify-between";
                        li.innerHTML = `<span>${city.name}</span> <span class="text-gray-400 font-bold ml-2">${city.state_uf.toUpperCase()}</span>`;
                        
                        li.addEventListener('click', () => {
                            cityInput.value = `${city.name} - ${city.state_uf.toUpperCase()}`;
                            selectedUf.value = city.state_uf.toLowerCase();
                            selectedCitySlug.value = city.slug;
                            autocompleteList.innerHTML = '';
                            autocompleteList.classList.add('hidden');
                        });
                        
                        autocompleteList.appendChild(li);
                    });
                    autocompleteList.classList.remove('hidden');
                } else {
                    autocompleteList.innerHTML = '<li class="px-4 py-3 text-gray-500">Nenhuma cidade encontrada</li>';
                    autocompleteList.classList.remove('hidden');
                }
            } catch (err) {
                console.error("Erro na busca:", err);
            }
        }, 300);
    });

    // Fechar ao clicar fora
    document.addEventListener('click', function(e) {
        if (e.target !== cityInput && e.target !== autocompleteList) {
            autocompleteList.classList.add('hidden');
        }
    });

    function executeCitySearch() {
        const cat = document.getElementById('category-select').value;
        const status = document.getElementById('geo-status');
        
        const uf = selectedUf.value;
        const slug = selectedCitySlug.value;
        
        if (!slug || !uf) {
            status.textContent = "Por favor, selecione uma cidade na lista para prosseguir.";
            status.classList.remove("hidden");
            status.classList.add("text-red-400");
            return;
        }
        
        // Roteador SSG Direto
        window.location.href = `/${cat}/${uf}/${slug}`;
    }
</script>

</body>
</html>
