<!-- JS INLINE para Shuffle sem FLICKER via CSS Order -->
<script>
    document.addEventListener("DOMContentLoaded", () => {
        const container = document.getElementById("cards-container");
        if(!container) return;
        const cards = Array.from(container.children);
        
        cards.forEach(card => {
            const tier = parseInt(card.getAttribute('data-tier'), 10);
            const salt = parseFloat(card.getAttribute('data-salt'));
            // Calculo da ordem hibrida.
            // Ex: Elite (1) tem order 10 + algo.
            // Aqui multiplicamos por 1000 p criar scale. Aleatório dentro do mesmo Tier.
            let finalOrder = (tier * 1000) + Math.floor(Math.random() * 999);
            card.style.order = finalOrder;
        });
    });
</script>
